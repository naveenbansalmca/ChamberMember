
  <header class="events-title-bar">Events</header>

  <section class="events-panel">
    <div class="panel-toolbar">
      <div class="toolbar-left">
        <span class="results">Results Found: {{ events.length }}</span>
        <label>
          Sort by
          <select>
            <option>Date</option>
          </select>
        </label>
      </div>

      <div class="toolbar-actions">
        <button class="active">List View</button>
        <button>Person View</button>
        <button>Calendar View</button>
      </div>
    </div>

    <table mat-table [dataSource]="dataSource" class="events-table">
      <ng-container matColumnDef="date">
        <td mat-cell *matCellDef="let event">
          <div class="date-block">
            <span class="month">{{ event.month }}</span>
            <span class="day">{{ event.day }}</span>
            <span class="weekday">{{ event.weekDay }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="details">
        <td mat-cell *matCellDef="let event">
          <div class="event-info">
            <h4>{{ event.title }}</h4>
            <p class="time">{{ event.dateTime }}</p>
            <p>{{ event.description }}</p>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="meta">
        <td mat-cell *matCellDef="let event">
          <div class="event-meta">
            <p class="type">Event</p>
            <ul>
              <li *ngFor="let badge of event.badges">{{ badge }}</li>
            </ul>
            <button (click)="viewDetails(event.id)">View Details</button>
          </div>
        </td>
      </ng-container>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="events.length" [pageSize]="10" [pageSizeOptions]="[10, 20, 30]"
      showFirstLastButtons aria-label="Select page of events">
    </mat-paginator>
  </section>
